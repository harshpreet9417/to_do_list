<!-- TASK IS TO MAKE T DO LIST WITH INPUT FIELD  WITH ADD BUTTON AND SHOW WHICH TASKS ARE GETTING ADDED USINF FOR EACH METHOD-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display:flex;
            justify-content: center;
            align-items: center;
            background-color:lightpink;
            height: 100vh;
        }
        #input {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
  width: 60%;
  outline: none;
}

#input:focus {
  border-color: purple;
  box-shadow: 0 0 5px violet;
}

#b1 {
  border-radius: 5px;
  padding: 8px 12px;
  background: linear-gradient(to right, violet, pink);
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

#b1:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px pink;
}


#d1 {
  border: none;
  border-radius: 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  padding: 20px;
  height: 400px;
  width:300px ;
  background: linear-gradient(to bottom right, #fff, #ffe4f2);
  transition: all 0.5s ease-in-out;
}

 #d1{
    animation:fadeIn 0.6s ease-out;
 }
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

h1 {
  font-family: 'Poppins', sans-serif;
  color: purple;
  text-shadow: 1px 1px pink;
  animation: glow 6s ease-in-out infinite alternate;
}
@keyframes glow {
    from {
        font-family:'Times New Roman', Times, serif;
        font-weight: 500;
        color:maroon;
        text-shadow: 0 0 5px pink, 0 0 10px violet;
    }
    to{
        font-family: 'Times New Roman', Times, serif;
       font-weight: 400 ;
        color:#f87171;
        text-shadow: 0 0 20px hotpink, 0 0 30px pink;
    }
    
}

        .h1:hover{
            transform: scale(1.07);
            

        }
        h1{
            text-align: center;
            color:maroon;
              transition: all 0.5s ease;
        }

        #tasklist{
            text-align: left;
           margin-left: 5px;
          
        }
        
        .editbutton, .deletebutton {
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(232, 203, 60, 0.961);
    }
        .editbutton {
        background: linear-gradient(to right, #7dd3fc, #60a5fa);
}

        .deletebutton {
        background: linear-gradient(to right, #fca5a5, #f87171); 
}
        .task-item{
            display: flex;
            justify-content:space-between;
            align-items: center;
            border:solid lightgray;
            margin-bottom: 5px;
            border-radius: 5px;
        }
        .task-buttons{
            display: flex;
            gap: 7px;
        }

        .completed {
  text-decoration: line-through;
  color: gray;
  opacity: 0.7;
}
    
    </style>
</head>
<body>
    <div id="d1" class="d1">
        <form id="todolist">
            <h1 class="h1">TO DO LIST</h1> <br>
            <input type="text" placeholder="fill your task" id="input"> <button id="b1">ADD</button>

        </form>
        <br>
        <div id="tasklist"></div>
    </div>
    
    <script>
        const form=document.getElementById("todolist");
        const input=document.getElementById("input");
        const tasklist=document.getElementById("tasklist");

        form.addEventListener('submit',function(e){
            e.preventDefault();
            const tasktext=input.value.trim();
            if(tasktext !==""){
                const taskitem=document.createElement('div');
                taskitem.className='task-item';

                const taskContent = document.createElement("span");
                taskContent.textContent = tasktext;
                taskContent.onclick = function() {
                taskContent.classList.toggle('completed');
            };

                const buttondiv=document.createElement("div");
                buttondiv.className="task-buttons";

                const editbutton=document.createElement("button");
                editbutton.className="editbutton";
                editbutton.textContent="EDIT";

                editbutton.onclick=function(){
                const newtask= prompt("edit your task",taskContent.textContent);
                    if(newtask!==null && newtask.trim()!==""){
                        taskContent.textContent=newtask.trim();
                    }
                };

                const deletebutton=document.createElement("button");
                deletebutton.className="deletebutton";
                deletebutton.textContent="DELETE";
                deletebutton.onclick=function(){
                    taskitem.remove();
                };
                buttondiv.appendChild(editbutton);
                buttondiv.appendChild(deletebutton);
                taskitem.appendChild(taskContent);
                taskitem.appendChild(buttondiv);
                tasklist.appendChild(taskitem);
                input.value="";
            }
        });

      
    </script>
</body>
</html>
